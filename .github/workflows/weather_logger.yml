name: Daily Weather Logger

on:
  schedule:
    - cron: '0,30 * * * *'  # 這是每 30 分鐘執行一次的正確格式
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出儲存庫代碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: |
          pip install requests pandas

      - name: 執行爬蟲腳本
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
        run: python main.py

      - name: 將更新後的 CSV 提交回 GitHub
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add human_readable_weather.csv
          git commit -m "自動更新天氣數據: $(date)" || echo "沒有新數據可提交"
          git push